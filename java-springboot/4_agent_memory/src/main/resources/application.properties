# Application name
spring.application.name=agent-memory

# Server configuration
server.port=8083

# Agent Memory Server configuration
agent-memory.server.url=${AGENT_MEMORY_SERVER_URL:http://localhost:8000}
agent-memory.server.namespace=workshop

# Disable Spring AI auto-configuration (we create ChatModel dynamically with user's API key)
spring.ai.openai.api-key=not-used
spring.ai.retry.max-attempts=1

# Logging
logging.level.com.redis.workshop.memory=INFO
logging.level.org.springframework.web.reactive.function.client=DEBUG

