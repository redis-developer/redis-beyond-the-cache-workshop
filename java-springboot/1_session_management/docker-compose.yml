services:
  session-management:
    build:
      context: ../..
      dockerfile: java-springboot/1_session_management/Dockerfile
      args:
        # Standalone mode: use root path (/)
        VUE_APP_BASE_PATH: /
    ports:
      - "8080:8080"
    environment:
      # Inside Docker, use the redis service hostname instead of localhost
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - WORKSHOP_BASE_PATH=/workspace/1_session_management
    volumes:
      - ../:/workspace/1_session_management
    depends_on:
      - redis

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
      - RI_REDIS_ALIAS=Workshop Redis
      - RI_REDIS_USERNAME=default
      - RI_REDIS_PASSWORD=
      - RI_REDIS_TLS=FALSE
    volumes:
      - redis-insight-data:/db
    depends_on:
      - redis

volumes:
  redis-data:
  redis-insight-data:

