services:
  session-management-api:
    build:
      context: ../..
      dockerfile: java-springboot/1_session_management/Dockerfile
    ports:
      - "18080:18080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - WORKSHOP_BASE_PATH=/workshop-sources
      - SERVER_PORT=18080
    volumes:
      - ./:/workshop-sources
    depends_on:
      redis:
        condition: service_healthy

  session-management:
    build:
      context: ../..
      dockerfile: java-springboot/1_session_management_frontend/Dockerfile
      args:
        VUE_APP_BASE_PATH: /
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - WORKSHOP_BASE_PATH=/workshop-sources
      - SERVER_PORT=8080
      - WORKSHOP_BACKEND_URL=http://session-management-api:18080
    volumes:
      - ./:/workshop-sources
    depends_on:
      - session-management-api

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
      - RI_REDIS_ALIAS=Workshop Redis
      - RI_REDIS_USERNAME=default
      - RI_REDIS_PASSWORD=
      - RI_REDIS_TLS=FALSE
    volumes:
      - redis-insight-data:/db
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  redis-insight-data:
