<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Redis Session Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="8" fill="#DC382C"/>
                    <path d="M24 12L36 18V30L24 36L12 30V18L24 12Z" fill="white"/>
                </svg>
            </div>
            <h1>Redis Session Management</h1>
            <p class="subtitle">Distributed Session Workshop</p>

            <div th:if="${param.error}" class="alert alert-error">
                Invalid username or password
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out successfully
            </div>
            <div th:if="${param.expired}" class="alert alert-warning">
                Your session has expired
            </div>
            <div th:if="${param.invalid}" class="alert alert-warning">
                Invalid session
            </div>

            <form th:action="@{/login}" method="post" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" 
                           placeholder="Enter username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" 
                           placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <div class="demo-credentials">
                <p><strong>Demo Credentials:</strong></p>
                <p>Username: <code>user</code></p>
                <p>Password: <code>password</code></p>
            </div>
        </div>
    </div>
</body>
</html>
