services:
  distributed-locks-api:
    build:
      context: ../..
      dockerfile: java-springboot/3_distributed_locks/Dockerfile
    ports:
      - "18082:18082"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/workshop
      - SPRING_DATASOURCE_USERNAME=workshop
      - SPRING_DATASOURCE_PASSWORD=workshop
      - WORKSHOP_BASE_PATH=/workshop-sources
      - SERVER_PORT=18082
    volumes:
      - ./:/workshop-sources
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  distributed-locks:
    build:
      context: ../..
      dockerfile: java-springboot/3_distributed_locks_frontend/Dockerfile
      args:
        VUE_APP_BASE_PATH: /
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - WORKSHOP_BASE_PATH=/workshop-sources
      - SERVER_PORT=8082
      - WORKSHOP_BACKEND_URL=http://distributed-locks-api:18082
    volumes:
      - ./:/workshop-sources
    depends_on:
      - distributed-locks-api

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=workshop
      - POSTGRES_USER=workshop
      - POSTGRES_PASSWORD=workshop
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop -d workshop"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
      - RI_REDIS_ALIAS=Workshop Redis
      - RI_REDIS_USERNAME=default
      - RI_REDIS_PASSWORD=
      - RI_REDIS_TLS=FALSE
    volumes:
      - redis-insight-data:/db
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  redis-insight-data:
  postgres-data:
