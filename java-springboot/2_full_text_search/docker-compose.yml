services:
  full-text-search-api:
    build:
      context: ../..
      dockerfile: java-springboot/2_full_text_search/Dockerfile
    ports:
      - "18081:18081"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - WORKSHOP_BASE_PATH=/workshop-sources
      - SERVER_PORT=18081
    volumes:
      - ./:/workshop-sources
    depends_on:
      redis:
        condition: service_healthy

  full-text-search:
    build:
      context: ../..
      dockerfile: java-springboot/2_full_text_search_frontend/Dockerfile
      args:
        VUE_APP_BASE_PATH: /
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - WORKSHOP_BASE_PATH=/workshop-sources
      - SERVER_PORT=8081
      - WORKSHOP_BACKEND_URL=http://full-text-search-api:18081
    volumes:
      - ./:/workshop-sources
    depends_on:
      - full-text-search-api

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
      - RI_REDIS_ALIAS=Workshop Redis
      - RI_REDIS_USERNAME=default
      - RI_REDIS_PASSWORD=
      - RI_REDIS_TLS=FALSE
    volumes:
      - redis-insight-data:/db
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  redis-insight-data:
