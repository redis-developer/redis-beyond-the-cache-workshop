# Docker Compose for running workshops inside Docker-in-Docker
# This file is used by the Workshop Hub when running in DinD mode

services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
    depends_on:
      - redis

  session-management:
    build:
      context: /workshops
      dockerfile: java-springboot/1_session_management/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - WORKSHOP_BASE_PATH=/workspace/1_session_management
    volumes:
      # Mount workshop source files for editing (from the Hub container)
      - /workshops/java-springboot/1_session_management:/workspace/1_session_management
    depends_on:
      - redis

