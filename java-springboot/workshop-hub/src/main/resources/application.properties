# Server Configuration
server.port=9000
server.forward-headers-strategy=framework
spring.application.name=workshop-hub

# Workshop Configuration
# Path to repository root (where docker-compose.yml is located)
# Can be overridden by WORKSHOP_ROOT_PATH environment variable
workshop.root.path=${WORKSHOP_ROOT_PATH:..}

# CORS Configuration
# Frontend URL (set via environment variable or default to localhost)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

