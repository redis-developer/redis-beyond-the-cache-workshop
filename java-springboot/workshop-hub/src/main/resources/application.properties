# Server Configuration
server.port=9000
server.forward-headers-strategy=framework
spring.application.name=workshop-hub

# Workshop Configuration
# Path to repository root (where docker-compose.yml is located)
# Default: . (current directory, assumes bootRun is executed from repository root)
# Container: /workshops (set by Dockerfile)
workshop.root.path=${WORKSHOP_ROOT_PATH:.}

# Local mode - when true, uses docker-compose.local.yml and direct URLs (localhost:8080)
# Default: true for local development, set to false in container Dockerfile
workshop.local.mode=${WORKSHOP_LOCAL_MODE:true}

# Directory containing docker-compose files
workshop.compose.dir=${WORKSHOP_COMPOSE_DIR:java-springboot/workshop-hub}

# CORS Configuration
# Frontend URL (set via environment variable or default to localhost)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

