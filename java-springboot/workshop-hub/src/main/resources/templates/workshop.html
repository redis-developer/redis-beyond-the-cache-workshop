<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${workshop.title} + ' - Redis Workshop'">Workshop - Redis Workshop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; overflow: hidden; }
        .layout { display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 1rem; border-bottom: 1px solid #0f3460; background: #0f3460; }
        .sidebar-header h1 { font-size: 1rem; color: #DC382D; margin-bottom: 0.25rem; }
        .sidebar-header p { font-size: 0.75rem; color: #888; }
        .back-link { display: flex; align-items: center; gap: 0.5rem; color: #888; text-decoration: none; font-size: 0.8rem; margin-bottom: 0.5rem; }
        .back-link:hover { color: #DC382D; }
        
        /* Status Section */
        .status-section { padding: 1rem; border-bottom: 1px solid #0f3460; }
        .status-title { font-size: 0.75rem; text-transform: uppercase; color: #666; margin-bottom: 0.75rem; letter-spacing: 0.5px; }
        .status-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0; font-size: 0.85rem; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.running { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
        .status-dot.stopped { background: #666; }
        .status-dot.starting { background: #fbbf24; animation: pulse 1s infinite; }
        .status-dot.restarting { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }
        
        /* Controls Section */
        .controls-section { padding: 1rem; flex: 1; }
        .control-btn { width: 100%; padding: 0.75rem 1rem; margin-bottom: 0.5rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s; }
        .control-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .control-btn.primary { background: #DC382D; color: white; }
        .control-btn.primary:hover:not(:disabled) { background: #b82d24; }
        .control-btn.secondary { background: #0f3460; color: #e0e0e0; border: 1px solid #1e4976; }
        .control-btn.secondary:hover:not(:disabled) { background: #1e4976; }
        .control-btn.warning { background: #f59e0b; color: #1a1a2e; }
        .control-btn.warning:hover:not(:disabled) { background: #d97706; }
        .control-btn.danger { background: #ef4444; color: white; }
        .control-btn.danger:hover:not(:disabled) { background: #dc2626; }
        
        /* Message */
        .message { padding: 0.75rem; border-radius: 6px; font-size: 0.8rem; margin-bottom: 1rem; }
        .message.success { background: rgba(74, 222, 128, 0.2); border: 1px solid #4ade80; color: #4ade80; }
        .message.error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; }
        .message.info { background: rgba(59, 130, 246, 0.2); border: 1px solid #3b82f6; color: #3b82f6; }
        
        /* Workshop Info */
        .workshop-info { padding: 1rem; border-top: 1px solid #0f3460; margin-top: auto; }
        .workshop-info h3 { font-size: 0.9rem; margin-bottom: 0.5rem; }
        .workshop-info p { font-size: 0.75rem; color: #888; line-height: 1.4; }
        
        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .iframe-container { flex: 1; position: relative; }
        .iframe-container iframe { width: 100%; height: 100%; border: none; }
        .iframe-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #888; }
        .iframe-loading .spinner { width: 40px; height: 40px; border: 3px solid #0f3460; border-top-color: #DC382D; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="back-link">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0l-8 8 8 8V0z"/></svg>
                    Back to Hub
                </a>
                <h1 th:text="${workshop.title}">Workshop Title</h1>
                <p th:text="'~' + ${workshop.estimatedMinutes} + ' minutes'">~30 minutes</p>
            </div>
            
            <div class="status-section">
                <div class="status-title">Infrastructure Status</div>
                <div class="status-item">
                    <span class="status-dot" id="redis-status"></span>
                    <span>Redis</span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="insight-status"></span>
                    <span>Redis Insight</span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="workshop-status"></span>
                    <span>Workshop App</span>
                </div>
            </div>
            
            <div class="controls-section">
                <div id="message-container"></div>
                <button class="control-btn primary" id="deploy-btn" onclick="deployAll()">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0l8 8-8 8V0z"/></svg>
                    Deploy All
                </button>
                <button class="control-btn secondary" id="restart-btn" onclick="restartApp()" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3V0L4 4l4 4V5a5 5 0 110 6v2a7 7 0 100-10z"/></svg>
                    Restart App
                </button>
                <button class="control-btn danger" id="stop-btn" onclick="stopAll()" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="4" y="4" width="8" height="8"/></svg>
                    Stop All
                </button>
                <button class="control-btn secondary" onclick="refreshIframe()">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3V0L4 4l4 4V5a5 5 0 110 6v2a7 7 0 100-10z"/></svg>
                    Refresh View
                </button>
            </div>
            
            <div class="workshop-info">
                <h3>About this Workshop</h3>
                <p th:text="${workshop.description}">Workshop description</p>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="iframe-container">
                <div class="iframe-loading" id="iframe-loading">
                    <div class="spinner"></div>
                    <p>Waiting for workshop to start...</p>
                </div>
                <iframe id="workshop-iframe" th:src="${workshop.url}" onload="hideLoading()"></iframe>
            </div>
        </main>
    </div>
    
    <script th:inline="javascript">
        const workshopId = /*[[${workshop.id}]]*/ '';
        const workshopUrl = /*[[${workshop.url}]]*/ '';
        let statusInterval;
        let isRestarting = false;

        function hideLoading() { document.getElementById('iframe-loading').style.display = 'none'; }
        function showLoading(message) {
            const loadingEl = document.getElementById('iframe-loading');
            loadingEl.style.display = 'block';
            const msgEl = loadingEl.querySelector('p');
            if (msgEl && message) msgEl.textContent = message;
        }

        function showMessage(text, type) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        async function updateStatus() {
            try {
                const response = await fetch('/manager/api/status');
                const services = await response.json();

                const redis = services.find(s => s.name === 'redis');
                const insight = services.find(s => s.name === 'redis-insight');
                const workshop = services.find(s => s.name === workshopId);

                console.log('updateStatus called - isRestarting:', isRestarting, 'workshop status:', workshop?.status);

                updateDot('redis-status', redis?.status);
                updateDot('insight-status', insight?.status);

                // Show 'restarting' status if we're in restart mode
                if (isRestarting) {
                    updateDot('workshop-status', 'restarting');
                } else {
                    updateDot('workshop-status', workshop?.status);
                }

                const allInfraRunning = redis?.status === 'running' && insight?.status === 'running';
                const workshopRunning = workshop?.status === 'running';

                // Don't show deploy button during restart
                if (isRestarting) {
                    console.log('In restart mode - hiding deploy button');
                    document.getElementById('deploy-btn').style.display = 'none';
                    document.getElementById('restart-btn').style.display = 'flex';
                    document.getElementById('stop-btn').style.display = 'none';
                } else {
                    console.log('Not in restart mode - showing normal buttons');
                    document.getElementById('deploy-btn').style.display = (!allInfraRunning || !workshopRunning) ? 'flex' : 'none';
                    document.getElementById('restart-btn').style.display = workshopRunning ? 'flex' : 'none';
                    document.getElementById('stop-btn').style.display = (allInfraRunning || workshopRunning) ? 'flex' : 'none';
                }

                if (workshopRunning && !isRestarting) hideLoading();
            } catch (e) { console.error('Status error:', e); }
        }

        function updateDot(id, status) {
            const dot = document.getElementById(id);
            dot.className = 'status-dot ' + (status || 'stopped');
        }

        async function deployAll() {
            const btn = document.getElementById('deploy-btn');
            btn.disabled = true; btn.textContent = 'Deploying...';
            showLoading('Deploying workshop...');
            try {
                await fetch('/manager/api/infrastructure/start', { method: 'POST' });
                await new Promise(r => setTimeout(r, 3000));
                await fetch(`/manager/api/workshop/${workshopId}/start`, { method: 'POST' });
                showMessage('Deployment started! Please wait...', 'info');
                setTimeout(() => { refreshIframe(); updateStatus(); }, 8000);
            } catch (e) { showMessage('Deployment failed: ' + e.message, 'error'); }
            finally { btn.disabled = false; btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0l8 8-8 8V0z"/></svg> Deploy All'; }
        }

        async function restartApp() {
            const btn = document.getElementById('restart-btn');
            console.log('restartApp called - setting isRestarting to true');
            isRestarting = true;
            btn.disabled = true;
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" class="spinning"><path d="M8 3V0L4 4l4 4V5a5 5 0 110 6v2a7 7 0 100-10z"/></svg> Restarting...';
            showLoading('Restarting workshop app...');
            updateStatus(); // Update UI immediately to show restarting state

            try {
                await fetch(`/manager/api/workshop/${workshopId}/restart`, { method: 'POST' });
            } catch (e) {
                // Ignore network errors - the restart is likely still happening
                console.log('Network error during restart request, continuing to wait...');
            }

            showMessage('Restarting app... Please wait.', 'info');

            // Always wait for workshop to come back up
            console.log('Waiting for workshop to restart...');
            await waitForWorkshopReady();
            console.log('Workshop is ready - setting isRestarting to false');

            isRestarting = false;
            btn.disabled = false;
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3V0L4 4l4 4V5a5 5 0 110 6v2a7 7 0 100-10z"/></svg> Restart App';
            refreshIframe();
            updateStatus();
        }

        async function waitForWorkshopReady() {
            // First, wait for the workshop to go DOWN (max 10 seconds)
            console.log('Waiting for workshop to go down...');
            for (let i = 0; i < 10; i++) {
                try {
                    const response = await fetch('/manager/api/status');
                    const services = await response.json();
                    const workshop = services.find(s => s.name === workshopId);
                    console.log('Workshop status (waiting for down):', workshop?.status);
                    if (workshop?.status !== 'running') {
                        console.log('Workshop is down');
                        break; // Workshop is down, now wait for it to come back
                    }
                } catch (e) { /* ignore */ }
                await new Promise(r => setTimeout(r, 1000));
            }

            // Then, wait for the workshop to come back UP (max 30 seconds)
            console.log('Waiting for workshop to come back up...');
            for (let i = 0; i < 30; i++) {
                try {
                    const response = await fetch('/manager/api/status');
                    const services = await response.json();
                    const workshop = services.find(s => s.name === workshopId);
                    console.log('Workshop status (waiting for up):', workshop?.status);
                    if (workshop?.status === 'running') {
                        console.log('Workshop is back up!');
                        return;
                    }
                } catch (e) { /* ignore */ }
                await new Promise(r => setTimeout(r, 1000));
            }
            console.log('Timeout waiting for workshop to come back up');
        }

        async function stopAll() {
            const btn = document.getElementById('stop-btn');
            btn.disabled = true; btn.textContent = 'Stopping...';
            try {
                await fetch(`/manager/api/workshop/${workshopId}/stop`, { method: 'POST' });
                await fetch('/manager/api/infrastructure/stop', { method: 'POST' });
                showMessage('All services stopped.', 'success');
                showLoading('Waiting for workshop to start...');
                updateStatus();
            } catch (e) { showMessage('Stop failed: ' + e.message, 'error'); }
            finally { btn.disabled = false; btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="4" y="4" width="8" height="8"/></svg> Stop All'; }
        }

        function refreshIframe() {
            const iframe = document.getElementById('workshop-iframe');
            iframe.src = workshopUrl + '?t=' + Date.now();
        }

        updateStatus();
        statusInterval = setInterval(updateStatus, 5000);
        window.addEventListener('beforeunload', () => clearInterval(statusInterval));
    </script>
</body>
</html>
