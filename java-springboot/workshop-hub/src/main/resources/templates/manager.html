<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Manager - Redis Beyond the Cache</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .manager-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        .manager-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .manager-header h1 {
            font-size: 2rem;
            color: #00bcd4;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .manager-header p {
            color: #94a3b8;
            font-size: 1rem;
        }

        .section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.25rem;
            color: #e2e8f0;
            margin-bottom: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .service-grid {
            display: grid;
            gap: 1rem;
        }

        .service-card {
            background-color: #101A21;
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .service-card:hover {
            border-color: rgba(0, 188, 212, 0.4);
        }

        .service-info {
            flex: 1;
        }

        .service-name {
            font-size: 1.125rem;
            color: #e2e8f0;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .service-details {
            font-size: 0.875rem;
            color: #64748b;
        }

        .service-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-indicator.running {
            background-color: #86efac;
            box-shadow: 0 0 8px rgba(134, 239, 172, 0.5);
        }

        .status-indicator.stopped {
            background-color: #64748b;
        }

        .status-indicator.starting {
            background-color: #fde047;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-indicator.error {
            background-color: #fca5a5;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .service-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            background-color: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.4);
            color: #86efac;
        }

        .btn-start:hover:not(:disabled) {
            background-color: rgba(34, 197, 94, 0.3);
            border-color: rgba(34, 197, 94, 0.6);
        }

        .btn-stop {
            background-color: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }

        .btn-stop:hover:not(:disabled) {
            background-color: rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 0.6);
        }

        .btn-restart {
            background-color: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.4);
            color: #93c5fd;
        }

        .btn-restart:hover:not(:disabled) {
            background-color: rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.6);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #00bcd4;
            text-decoration: none;
            font-size: 0.9375rem;
            margin-bottom: 2rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #26c6da;
        }

        .message {
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            font-size: 0.875rem;
        }

        .message.success {
            background-color: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .message.error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="manager-container">
        <a href="/" class="back-link">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 0l-8 8 8 8V0z"/>
            </svg>
            Back to Workshop Hub
        </a>

        <div class="manager-header">
            <h1>Workshop Manager</h1>
            <p>Control your workshop infrastructure and applications</p>
        </div>

        <div id="messageContainer"></div>

        <div class="section">
            <div class="section-title">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M3 3h14v14H3V3z"/>
                </svg>
                Infrastructure Services
            </div>
            <div class="service-grid" id="infrastructureServices">
                <div class="loading">Loading services...</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10 2l8 4v8l-8 4-8-4V6l8-4z"/>
                </svg>
                Workshop Applications
            </div>
            <div class="service-grid" id="workshopServices">
                <div class="loading">Loading services...</div>
            </div>
        </div>
    </div>

    <script>
        let statusCheckInterval;

        function showMessage(message, isSuccess) {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSuccess ? 'success' : 'error'}`;
            messageDiv.textContent = message;
            container.innerHTML = '';
            container.appendChild(messageDiv);

            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/manager/api/status');
                const services = await response.json();

                const infrastructureServices = services.filter(s => s.type === 'infrastructure');
                const workshopServices = services.filter(s => s.type === 'workshop');

                renderServices('infrastructureServices', infrastructureServices, true);
                renderServices('workshopServices', workshopServices, false);
            } catch (error) {
                console.error('Error fetching status:', error);
                showMessage('Error fetching service status', false);
            }
        }

        function renderServices(containerId, services, isInfrastructure) {
            const container = document.getElementById(containerId);

            if (services.length === 0) {
                container.innerHTML = '<div class="loading">No services found</div>';
                return;
            }

            container.innerHTML = services.map(service => `
                <div class="service-card">
                    <div class="service-info">
                        <div class="service-name">${formatServiceName(service.name)}</div>
                        <div class="service-details">
                            Port: ${service.port} |
                            <a href="${service.url}" target="_blank" style="color: #00bcd4;">${service.url}</a>
                        </div>
                        <div class="service-status">
                            <span class="status-indicator ${service.status}"></span>
                            <span style="color: #94a3b8; font-size: 0.875rem;">${service.status}</span>
                        </div>
                    </div>
                    <div class="service-actions">
                        ${renderActions(service, isInfrastructure)}
                    </div>
                </div>
            `).join('');

            // Attach event listeners
            attachEventListeners(services, isInfrastructure);
        }

        function formatServiceName(name) {
            return name.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function renderActions(service, isInfrastructure) {
            if (isInfrastructure) {
                // Infrastructure services (Docker Compose)
                if (service.status === 'running') {
                    return `<button class="btn btn-stop" data-action="stop-infra">Stop</button>`;
                } else {
                    return `<button class="btn btn-start" data-action="start-infra">Start</button>`;
                }
            } else {
                // Workshop applications
                if (service.status === 'running') {
                    return `
                        <button class="btn btn-restart" data-action="restart" data-id="${service.name}">Restart</button>
                        <button class="btn btn-stop" data-action="stop" data-id="${service.name}">Stop</button>
                    `;
                } else {
                    return `<button class="btn btn-start" data-action="start" data-id="${service.name}">Start</button>`;
                }
            }
        }

        function attachEventListeners(services, isInfrastructure) {
            if (isInfrastructure) {
                document.querySelectorAll('[data-action="start-infra"]').forEach(btn => {
                    btn.addEventListener('click', () => handleInfrastructureAction('start'));
                });
                document.querySelectorAll('[data-action="stop-infra"]').forEach(btn => {
                    btn.addEventListener('click', () => handleInfrastructureAction('stop'));
                });
            } else {
                document.querySelectorAll('[data-action="start"]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.dataset.id;
                        handleWorkshopAction('start', id);
                    });
                });
                document.querySelectorAll('[data-action="stop"]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.dataset.id;
                        handleWorkshopAction('stop', id);
                    });
                });
                document.querySelectorAll('[data-action="restart"]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.dataset.id;
                        handleWorkshopAction('restart', id);
                    });
                });
            }
        }

        async function handleInfrastructureAction(action) {
            try {
                const response = await fetch(`/manager/api/infrastructure/${action}`, {
                    method: 'POST'
                });
                const result = await response.json();

                showMessage(result.message, result.success);

                // Refresh status after a delay
                setTimeout(fetchStatus, 2000);
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error executing command', false);
            }
        }

        async function handleWorkshopAction(action, workshopId) {
            try {
                const response = await fetch(`/manager/api/workshop/${workshopId}/${action}`, {
                    method: 'POST'
                });
                const result = await response.json();

                showMessage(result.message, result.success);

                // Refresh status after a delay
                setTimeout(fetchStatus, action === 'start' || action === 'restart' ? 5000 : 2000);
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error executing command', false);
            }
        }

        // Initial load
        fetchStatus();

        // Auto-refresh every 5 seconds
        statusCheckInterval = setInterval(fetchStatus, 5000);

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (statusCheckInterval) {
                clearInterval(statusCheckInterval);
            }
        });
    </script>
</body>
</html>
