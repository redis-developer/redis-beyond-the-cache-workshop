---
services:
  redis:
    image: "redis/redis-stack-server:latest"
    ports:
    - "6379:6379"
    healthcheck:
      test:
      - "CMD"
      - "redis-cli"
      - "-p"
      - "6379"
      - "ping"
      interval: "5s"
      timeout: "5s"
      retries: 5
    profiles:
    - "infrastructure"
    - "workshops"
    - "workshop-1_session_management"
    - "workshop-2_full_text_search"
    - "workshop-3_distributed_locks"
    - "workshop-4_agent_memory"
  redis-insight:
    image: "redis/redisinsight:latest"
    ports:
    - "5540:5540"
    environment:
    - "RI_REDIS_HOST=redis"
    - "RI_REDIS_PORT=6379"
    profiles:
    - "infrastructure"
  postgres:
    image: "postgres:16"
    ports:
    - "5432:5432"
    environment:
    - "POSTGRES_DB=workshop"
    - "POSTGRES_USER=workshop"
    - "POSTGRES_PASSWORD=workshop"
    healthcheck:
      test:
      - "CMD-SHELL"
      - "pg_isready -U workshop -d workshop"
      interval: "5s"
      timeout: "5s"
      retries: 5
    profiles:
    - "workshops"
    - "workshop-3_distributed_locks"
  session-management-api:
    build:
      context: "${WORKSHOP_ROOT_PATH:-.}"
      dockerfile: "java-springboot/1_session_management/Dockerfile"
      args:
      - "SKIP_FRONTEND_BUILD=true"
    ports:
    - "18080:18080"
    environment:
    - "SPRING_DATA_REDIS_HOST=redis"
    - "SPRING_DATA_REDIS_PORT=6379"
    - "SPRING_REDIS_HOST=redis"
    - "SPRING_REDIS_PORT=6379"
    - "WORKSHOP_BASE_PATH=/workshop-sources"
    - "SERVER_PORT=18080"
    volumes:
    - "${WORKSHOP_ROOT_PATH:-.}/java-springboot/1_session_management:/workshop-sources"
    depends_on:
    - "redis"
    profiles:
    - "workshops"
    - "workshop-1_session_management"
  session-management:
    build:
      context: "${WORKSHOP_ROOT_PATH:-.}"
      dockerfile: "java-springboot/1_session_management_frontend/Dockerfile"
      args:
      - "SKIP_FRONTEND_BUILD=${SKIP_FRONTEND_BUILD:-false}"
    ports:
    - "8080:8080"
    environment:
    - "SPRING_DATA_REDIS_HOST=redis"
    - "SPRING_DATA_REDIS_PORT=6379"
    - "SPRING_REDIS_HOST=redis"
    - "SPRING_REDIS_PORT=6379"
    - "WORKSHOP_BASE_PATH=/workshop-sources"
    - "WORKSHOP_BACKEND_URL=http://session-management-api:18080"
    volumes:
    - "${WORKSHOP_ROOT_PATH:-.}/java-springboot/1_session_management:/workshop-sources"
    depends_on:
    - "session-management-api"
    profiles:
    - "workshops"
    - "workshop-1_session_management"
  full-text-search-api:
    build:
      context: "${WORKSHOP_ROOT_PATH:-.}"
      dockerfile: "java-springboot/2_full_text_search/Dockerfile"
      args:
      - "SKIP_FRONTEND_BUILD=true"
    ports:
    - "18081:18081"
    environment:
    - "SPRING_DATA_REDIS_HOST=redis"
    - "SPRING_DATA_REDIS_PORT=6379"
    - "SPRING_REDIS_HOST=redis"
    - "SPRING_REDIS_PORT=6379"
    - "WORKSHOP_BASE_PATH=/workshop-sources"
    - "SERVER_PORT=18081"
    volumes:
    - "${WORKSHOP_ROOT_PATH:-.}/java-springboot/2_full_text_search:/workshop-sources"
    depends_on:
    - "redis"
    profiles:
    - "workshops"
    - "workshop-2_full_text_search"
  full-text-search:
    build:
      context: "${WORKSHOP_ROOT_PATH:-.}"
      dockerfile: "java-springboot/2_full_text_search_frontend/Dockerfile"
      args:
      - "SKIP_FRONTEND_BUILD=${SKIP_FRONTEND_BUILD:-false}"
    ports:
    - "8081:8081"
    environment:
    - "SPRING_DATA_REDIS_HOST=redis"
    - "SPRING_DATA_REDIS_PORT=6379"
    - "SPRING_REDIS_HOST=redis"
    - "SPRING_REDIS_PORT=6379"
    - "WORKSHOP_BASE_PATH=/workshop-sources"
    - "SERVER_PORT=8081"
    - "WORKSHOP_BACKEND_URL=http://full-text-search-api:18081"
    volumes:
    - "${WORKSHOP_ROOT_PATH:-.}/java-springboot/2_full_text_search:/workshop-sources"
    depends_on:
    - "full-text-search-api"
    profiles:
    - "workshops"
    - "workshop-2_full_text_search"
  distributed-locks-api:
    build:
      context: "${WORKSHOP_ROOT_PATH:-.}"
      dockerfile: "java-springboot/3_distributed_locks/Dockerfile"
      args:
      - "SKIP_FRONTEND_BUILD=true"
    ports:
    - "18082:18082"
    environment:
    - "SPRING_DATA_REDIS_HOST=redis"
    - "SPRING_DATA_REDIS_PORT=6379"
    - "SPRING_REDIS_HOST=redis"
    - "SPRING_REDIS_PORT=6379"
    - "WORKSHOP_BASE_PATH=/workshop-sources"
    - "SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/workshop"
    - "SPRING_DATASOURCE_USERNAME=workshop"
    - "SPRING_DATASOURCE_PASSWORD=workshop"
    - "SERVER_PORT=18082"
    volumes:
    - "${WORKSHOP_ROOT_PATH:-.}/java-springboot/3_distributed_locks:/workshop-sources"
    depends_on:
    - "redis"
    - "postgres"
    profiles:
    - "workshops"
    - "workshop-3_distributed_locks"
  distributed-locks:
    build:
      context: "${WORKSHOP_ROOT_PATH:-.}"
      dockerfile: "java-springboot/3_distributed_locks_frontend/Dockerfile"
      args:
      - "SKIP_FRONTEND_BUILD=${SKIP_FRONTEND_BUILD:-false}"
    ports:
    - "8082:8082"
    environment:
    - "SPRING_DATA_REDIS_HOST=redis"
    - "SPRING_DATA_REDIS_PORT=6379"
    - "SPRING_REDIS_HOST=redis"
    - "SPRING_REDIS_PORT=6379"
    - "WORKSHOP_BASE_PATH=/workshop-sources"
    - "SERVER_PORT=8082"
    - "WORKSHOP_BACKEND_URL=http://distributed-locks-api:18082"
    volumes:
    - "${WORKSHOP_ROOT_PATH:-.}/java-springboot/3_distributed_locks:/workshop-sources"
    depends_on:
    - "distributed-locks-api"
    profiles:
    - "workshops"
    - "workshop-3_distributed_locks"
  agent-memory-api:
    build:
      context: "${WORKSHOP_ROOT_PATH:-.}"
      dockerfile: "java-springboot/4_agent_memory/Dockerfile"
      args:
      - "SKIP_FRONTEND_BUILD=true"
    ports:
    - "18083:18083"
    environment:
    - "SPRING_DATA_REDIS_HOST=redis"
    - "SPRING_DATA_REDIS_PORT=6379"
    - "SPRING_REDIS_HOST=redis"
    - "SPRING_REDIS_PORT=6379"
    - "WORKSHOP_BASE_PATH=/workshop-sources"
    - "AGENT_MEMORY_SERVER_URL=http://agent-memory-server:8000"
    - "SERVER_PORT=18083"
    volumes:
    - "${WORKSHOP_ROOT_PATH:-.}/java-springboot/4_agent_memory:/workshop-sources"
    depends_on:
    - "redis"
    - "agent-memory-server"
    profiles:
    - "workshops"
    - "workshop-4_agent_memory"
  agent-memory:
    build:
      context: "${WORKSHOP_ROOT_PATH:-.}"
      dockerfile: "java-springboot/4_agent_memory_frontend/Dockerfile"
      args:
      - "SKIP_FRONTEND_BUILD=${SKIP_FRONTEND_BUILD:-false}"
    ports:
    - "8083:8083"
    environment:
    - "SPRING_DATA_REDIS_HOST=redis"
    - "SPRING_DATA_REDIS_PORT=6379"
    - "SPRING_REDIS_HOST=redis"
    - "SPRING_REDIS_PORT=6379"
    - "WORKSHOP_BASE_PATH=/workshop-sources"
    - "SERVER_PORT=8083"
    - "WORKSHOP_BACKEND_URL=http://agent-memory-api:18083"
    volumes:
    - "${WORKSHOP_ROOT_PATH:-.}/java-springboot/4_agent_memory:/workshop-sources"
    depends_on:
    - "agent-memory-api"
    profiles:
    - "workshops"
    - "workshop-4_agent_memory"
  agent-memory-server:
    image: "redislabs/agent-memory-server:latest"
    ports:
    - "8000:8000"
    environment:
    - "REDIS_URL=redis://redis:6379"
    - "PORT=8000"
    - "GENERATION_MODEL=${GENERATION_MODEL:-gpt-4o-mini}"
    - "EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}"
    - "OPENAI_API_KEY=${OPENAI_API_KEY:-}"
    - "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}"
    - "LONG_TERM_MEMORY=True"
    - "ENABLE_TOPIC_EXTRACTION=True"
    - "SUMMARIZATION_THRESHOLD=0.7"
    - "DEDUPLICATION_DISTANCE_THRESHOLD=0.35"
    - "ENABLE_NER=True"
    - "DISABLE_AUTH=true"
    depends_on:
    - "redis"
    command:
    - "agent-memory"
    - "api"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"
    - "--task-backend=asyncio"
    healthcheck:
      test:
      - "CMD"
      - "curl"
      - "-f"
      - "http://localhost:8000/v1/health"
      interval: "10s"
      timeout: "5s"
      retries: 5
      start_period: "10s"
    profiles:
    - "workshops"
    - "workshop-4_agent_memory"
